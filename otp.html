<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form OTP</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: #f5f5f5;
}

/* HEADER */
.topbar img {
  width: 100%;
  display: block;
}

/* BANNER */
.banner {
  width: 100%;
  display: block;
}

/* TIMER */
.timer-text {
  margin-bottom: 10px;
  font-size: 15px;
  font-weight: bold;
  color: #007bff; /* biru */
  text-align: center;
  letter-spacing: 1px;
}

/* INPUT GROUP */
.input-group {
  position: relative;
  display: inline-block;
}

/* ICON */
.lock-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  width: 18px;
  height: 18px;
  fill: #999;
  transition: 0.3s;
}

/* INPUT */
.otp-single {
  width: 200px;
  height: 40px;
  font-size: 22px;
  text-align: center;
  border: 1.5px solid #ccc;
  border-radius: 10px;
  outline: none;
  letter-spacing: 8px;
  padding-left: 35px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  transition: 0.3s;
}

.input-group:focus-within .lock-icon {
  fill: #007bff;
  transform: translateY(-50%) scale(1.1);
}

.otp-single:focus {
  border-color: #007bff;
  box-shadow: 0 3px 10px rgba(0,123,255,0.2);
}

/* BUTTON */
button {
  margin-top: 15px;
  padding: 8px 18px;
  border: none;
  background: #007bff;
  color: white;
  border-radius: 6px;
  font-size: 14px;
  cursor: pointer;
}

button:disabled {
  background: #aaa;
}

/* FOOTER IMAGE */
.footer-img {
  padding: -40px;
  margin-bottom: 10px; /* ini kunci supaya tidak ketutup tombol */
}

.footer-img img {
  width: 100%;
  border-radius: 12px;
}

/* RESEND TEXT */
.resend-text {
  margin-top: 10px;
  font-size: 13px;
  color: #555;
}

#resendBtn {
  color: #aaa;
  cursor: not-allowed;
  margin-left: 5px;
}

#resendBtn.active {
  color: #007bff;
  cursor: pointer;
}

/* ERROR */
.error {
  color: #8B0000;
  font-weight: bold;
  display: none;
  margin-top: 10px;
}

/* LOADING */
.loading {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: white;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid #ddd;
  border-top: 4px solid #007bff;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 10px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>

</head>
<body>
  <!-- HEADER -->
<div class="topbar">
  <img src="images/header.jpg">
</div>

<!-- BANNER -->
<img src="images/banner.jpg" class="banner">

<div class="container">
  <h3>Kode OTP telah kami kirimkan ke WhatsApp Anda</h3>

  <form id="otpForm">

    <!-- TIMER DI ATAS -->
    <div class="timer-text" id="timerText">[ 02:50 ]</div>

    <!-- INPUT -->
    <div class="input-group">
      <svg class="lock-icon" viewBox="0 0 24 24">
        <path d="M12 1C9.24 1 7 3.24 7 6V8H6C4.9 8 4 8.9 4 10V20C4 21.1 4.9 22 6 22H18C19.1 22 20 21.1 20 20V10C20 8.9 19.1 8 18 8H17V6C17 3.24 14.76 1 12 1ZM9 6C9 4.34 10.34 3 12 3C13.66 3 15 4.34 15 6V8H9V6ZM12 17C10.9 17 10 16.1 10 15C10 13.9 10.9 13 12 13C13.1 13 14 13.9 14 15C14 16.1 13.1 17 12 17Z"/>
      </svg>

      <input 
        type="password" 
        id="otpInput" 
        class="otp-single" 
        maxlength="6" 
        inputmode="numeric" 
        placeholder="••••••"
      >
    </div>

    <br>

    <button type="submit" id="submitBtn" disabled>Lanjutkan</button>

    <!-- RESEND -->
    <div class="resend-text">
      Tidak menerima kode? 
      <span id="resendBtn">Kirim ulang OTP</span>
    </div>
    
    <!-- FOOTER IMAGE -->
<div class="footer-img">
  <img src="images/footer.jpg">
</div>

    <!-- ERROR -->
    <div class="error" id="errorMsg">
      OTP TIDAK VALID<br>
      SILAHKAN CEK OTP TERBARU
    </div>

  </form>
</div>

<!-- LOADING -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <div>Memverifikasi...</div>
</div>

<script>
const input = document.getElementById("otpInput");
const button = document.getElementById("submitBtn");
const form = document.getElementById("otpForm");
const errorMsg = document.getElementById("errorMsg");
const loading = document.getElementById("loading");

const timerText = document.getElementById("timerText");
const resendBtn = document.getElementById("resendBtn");

let totalTime = 170;
let timeLeft = totalTime;
let timer;

// TIMER
function startTimer() {
  timer = setInterval(() => {
    let m = Math.floor(timeLeft / 60);
    let s = timeLeft % 60;

    timerText.innerText =
      (m<10?"0":"")+m+":"+(s<10?"0":"")+s;

    if (timeLeft <= 0) {
      clearInterval(timer);
      resendBtn.classList.add("active");
    }

    timeLeft--;
  }, 1000);
}

// RESET TIMER
function resetTimer() {
  clearInterval(timer);
  timeLeft = totalTime;
  resendBtn.classList.remove("active");
  startTimer();
}

// RESEND
resendBtn.addEventListener("click", () => {
  if (!resendBtn.classList.contains("active")) return;
  resetTimer();
});

// START TIMER
startTimer();

// INPUT OTP
input.focus();

input.addEventListener("input", function() {
  this.value = this.value.replace(/[^0-9]/g, '');

  if (this.value.length === 6) {
    button.disabled = false;
    errorMsg.style.display = "none";
    form.dispatchEvent(new Event("submit"));
  } else {
    button.disabled = true;
  }
});

// SUBMIT
form.addEventListener("submit", function(e) {
  e.preventDefault();

  if (input.value.length < 6) return;

  loading.style.display = "flex";

  setTimeout(() => {
    loading.style.display = "none";
    errorMsg.style.display = "block";
    input.value = "";
    button.disabled = true;
    input.focus();
  }, 2000);
});
</script>

</body>
</html>
